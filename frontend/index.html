<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; }
        .gradient-bg { background: linear-gradient(135deg, #3a3a3a 0%, #1a1a1a 100%); }
        .btn-primary { background: #3b82f6; color: white; padding: 0.5rem 1.5rem; border-radius: 0.5rem; font-weight: 600; border: none; cursor: pointer; }
        .btn-primary:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 2px solid #3b82f6; color: #3b82f6; padding: 0.5rem 1.5rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; }
        .btn-outline:hover { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <nav class="bg-[#2d2d2d] shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold text-white">📚 Playground</a>
                    <a href="/books.html" class="text-gray-300 hover:text-blue-500">Книги</a>
                    <a href="/auth.html" class="text-gray-300 hover:text-blue-500" id="authLink">Войти</a>
                    <a href="/profile.html" class="text-gray-300 hover:text-blue-500 hidden" id="profileLink">Профиль</a>
                </div>
                <div id="userInfo" class="flex items-center space-x-4">
                    <span id="username" class="text-sm text-gray-400 hidden"></span>
                    <button id="logoutBtn" class="bg-red-600 text-white px-3 py-1 rounded hidden text-sm">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="gradient-bg py-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h1 class="text-5xl font-bold text-white mb-4">FastAPI Playground</h1>
            <p class="text-xl text-gray-300 mb-8">REST API с JWT аутентификацией и refresh токенами</p>
            <div class="flex justify-center space-x-4">
                <a href="/books.html" class="btn-primary">Просмотр книг</a>
                <a href="/docs" target="_blank" class="btn-outline">Swagger API</a>
            </div>
        </div>
    </section>

    <script>
        const API_URL = 'http://localhost:8000/api';
        
        function getToken() { return localStorage.getItem('access_token'); }
        
        function isAuthenticated() { return !!getToken(); }
        
        function updateNav() {
            const authLink = document.getElementById('authLink');
            const profileLink = document.getElementById('profileLink');
            const usernameSpan = document.getElementById('username');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (isAuthenticated()) {
                authLink.classList.add('hidden');
                profileLink.classList.remove('hidden');
                usernameSpan.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                
                fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                })
                .then(res => res.json())
                .then(data => { usernameSpan.textContent = data.username; })
                .catch(() => {});
            } else {
                authLink.classList.remove('hidden');
                profileLink.classList.add('hidden');
                usernameSpan.classList.add('hidden');
                logoutBtn.classList.add('hidden');
            }
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/';
        });
        
        updateNav();
    </script>
</body>
</html>
