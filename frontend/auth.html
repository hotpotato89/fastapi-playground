<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - BookLibrary</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div id="loginForm" class="form-container">
            <h2 class="form-title">🔐 Вход в систему</h2>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Нет аккаунта? 
                <a href="#" onclick="showRegister()">Зарегистрироваться</a>
            </p>
        </div>

        <div id="registerForm" class="form-container" style="display: none;">
            <h2 class="form-title">📝 Регистрация</h2>
            <form onsubmit="register(event)">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Уже есть аккаунт? 
                <a href="#" onclick="showLogin()">Войти</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        async function login(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    showNotification('Вход выполнен успешно!');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    const error = await response.json();
                    showNotification(error.detail || 'Ошибка входа', 'error');
                }
            } catch (error) {
                showNotification('Ошибка соединения', 'error');
            }
        }
        
        async function register(event) {
            event.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    showNotification('Регистрация успешна! Теперь войдите');
                    showLogin();
                    document.getElementById('loginUsername').value = username;
                } else {
                    const error = await response.json();
                    showNotification(error.detail || 'Ошибка регистрации', 'error');
                }
            } catch (error) {
                showNotification('Ошибка соединения', 'error');
            }
        }
        
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        
        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }
        
        checkAuth();
    </script>
</body>
</html>
