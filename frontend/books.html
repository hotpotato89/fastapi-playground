<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книги - FastAPI Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; }
        .card { background: #2d2d2d; border-radius: 0.75rem; padding: 1.5rem; transition: all 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .btn-primary { background: #3b82f6; color: white; padding: 0.5rem 1.5rem; border-radius: 0.5rem; font-weight: 600; border: none; cursor: pointer; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: white; padding: 0.3rem 0.8rem; border-radius: 0.5rem; font-size: 0.875rem; cursor: pointer; border: none; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #4a4a4a; color: white; padding: 0.3rem 0.8rem; border-radius: 0.5rem; cursor: pointer; border: none; }
        .btn-secondary:hover { background: #5a5a5a; }
        .input-field { width: 100%; background: #3a3a3a; border: 1px solid #4a4a4a; border-radius: 0.5rem; padding: 0.5rem 1rem; color: #e0e0e0; }
        .input-field:focus { outline: none; border-color: #3b82f6; }
        .genre-tag { padding: 0.2rem 0.6rem; background: #3b82f6; color: white; border-radius: 9999px; font-size: 0.75rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #2d2d2d; border-radius: 1rem; max-width: 28rem; width: 90%; padding: 1.5rem; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; font-size: 14px; z-index: 9999; }
        .toast-success { background: #22c55e; }
        .toast-error { background: #ef4444; }
    </style>
</head>
<body>
    <nav class="bg-[#2d2d2d] shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold text-white">📚 Playground</a>
                    <a href="/books.html" class="text-blue-500">Книги</a>
                    <a href="/auth.html" class="text-gray-300 hover:text-blue-500" id="authLink">Войти</a>
                    <a href="/profile.html" class="text-gray-300 hover:text-blue-500 hidden" id="profileLink">Профиль</a>
                </div>
                <div id="userInfo" class="flex items-center space-x-4">
                    <span id="username" class="text-sm text-gray-400 hidden"></span>
                    <button id="logoutBtn" class="bg-red-600 text-white px-3 py-1 rounded hidden text-sm">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-white">📖 Библиотека книг</h1>
            <button id="createBookBtn" class="btn-primary hidden">+ Добавить книгу</button>
        </div>

        <div class="bg-[#2d2d2d] p-6 rounded-xl mb-8">
            <div class="grid md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Жанр</label>
                    <select id="genreFilter" class="input-field">
                        <option value="">Все жанры</option>
                        <option value="fantasy">Фэнтези</option>
                        <option value="adventure">Приключения</option>
                        <option value="drama">Драма</option>
                        <option value="science">Наука</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">На странице</label>
                    <select id="limitFilter" class="input-field">
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="50" selected>50</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="applyFilters" class="btn-primary w-full">Применить</button>
                </div>
            </div>
        </div>

        <div id="booksGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div class="flex justify-center items-center space-x-4 mt-8">
            <button id="prevPage" class="btn-secondary disabled:opacity-50" disabled>← Назад</button>
            <span id="pageInfo" class="text-gray-400">Страница 1</span>
            <button id="nextPage" class="btn-secondary">Вперед →</button>
        </div>
    </div>

    <div id="bookModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" class="text-2xl font-bold text-white mb-4">Добавить книгу</h2>
            <form id="bookForm">
                <input type="hidden" id="bookId">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Название</label>
                    <input type="text" id="title" required class="input-field">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Жанр</label>
                    <select id="genre" required class="input-field">
                        <option value="">Выберите жанр</option>
                        <option value="fantasy">Фэнтези</option>
                        <option value="adventure">Приключения</option>
                        <option value="drama">Драма</option>
                        <option value="science">Наука</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-300 mb-2">Описание</label>
                    <textarea id="description" rows="3" class="input-field"></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="btn-secondary">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let currentPage = 1;
        let currentLimit = 50;
        let currentGenre = '';
        
        function getToken() { return localStorage.getItem('access_token'); }
        function getRefreshToken() { return localStorage.getItem('refresh_token'); }
        function isAuthenticated() { return !!getToken(); }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        async function refreshAccessToken() {
            const refresh_token = getRefreshToken();
            if (!refresh_token) return null;
            
            try {
                const response = await fetch(`${API_URL}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token })
                });
                
                if (response.status === 200) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access_token);
                    return data.access_token;
                }
            } catch (error) {
                console.error('Refresh failed:', error);
            }
            
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/auth.html';
            return null;
        }
        
        async function fetchWithAuth(url, options = {}) {
            let token = getToken();
            
            const makeRequest = async (t) => {
                return fetch(url, {
                    ...options,
                    headers: {
                        ...options.headers,
                        'Authorization': `Bearer ${t}`
                    }
                });
            };
            
            let response = await makeRequest(token);
            
            if (response.status === 401) {
                const newToken = await refreshAccessToken();
                if (newToken) {
                    response = await makeRequest(newToken);
                }
            }
            
            return response;
        }
        
        async function logout() {
            const refresh_token = getRefreshToken();
            if (refresh_token) {
                await fetch(`${API_URL}/auth/logout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token })
                });
            }
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/';
        }
        
        function updateNav() {
            const authLink = document.getElementById('authLink');
            const profileLink = document.getElementById('profileLink');
            const usernameSpan = document.getElementById('username');
            const logoutBtn = document.getElementById('logoutBtn');
            const createBtn = document.getElementById('createBookBtn');
            
            if (isAuthenticated()) {
                authLink.classList.add('hidden');
                profileLink.classList.remove('hidden');
                usernameSpan.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                createBtn.classList.remove('hidden');
                
                fetchWithAuth(`${API_URL}/auth/me`)
                    .then(res => res.json())
                    .then(data => { usernameSpan.textContent = data.username; })
                    .catch(() => {});
            } else {
                authLink.classList.remove('hidden');
                profileLink.classList.add('hidden');
                usernameSpan.classList.add('hidden');
                logoutBtn.classList.add('hidden');
                createBtn.classList.add('hidden');
            }
        }
        
        async function fetchBooks() {
            const params = new URLSearchParams({ page: currentPage, limit: currentLimit });
            if (currentGenre) params.append('genre', currentGenre);
            
            try {
                const response = await fetch(`${API_URL}/book/?${params}`);
                const books = await response.json();
                renderBooks(books);
                document.getElementById('pageInfo').textContent = `Страница ${currentPage}`;
                document.getElementById('prevPage').disabled = currentPage === 1;
            } catch (error) {
                showToast('Не удалось загрузить книги', 'error');
            }
        }
        
        function renderBooks(books) {
            const grid = document.getElementById('booksGrid');
            if (!books.length) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12">📭 Книг не найдено</div>';
                return;
            }
            
            grid.innerHTML = books.map(book => `
                <div class="card">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-xl font-bold text-white">${escapeHtml(book.title)}</h3>
                        <span class="genre-tag">${escapeHtml(book.genre)}</span>
                    </div>
                    ${book.description ? `<p class="text-gray-400 mb-4">${escapeHtml(book.description)}</p>` : ''}
                    <div class="text-sm text-gray-500">👤 Автор ID: ${book.author_id}</div>
                    ${isAuthenticated() ? `
                        <div class="flex justify-end space-x-2 mt-4 pt-3 border-t border-gray-700">
                            <button onclick='editBook(${book.id}, ${JSON.stringify(book.title)}, ${JSON.stringify(book.genre)}, ${JSON.stringify(book.description)})' class="text-blue-400 hover:text-blue-300">✏️ Редактировать</button>
                            <button onclick="deleteBook(${book.id})" class="text-red-400 hover:text-red-300">🗑️ Удалить</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }
        
        async function createBook(data) {
            try {
                const response = await fetchWithAuth(`${API_URL}/book/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.status === 201) {
                    showToast('Книга создана', 'success');
                    closeModal();
                    fetchBooks();
                } else if (response.status === 409) {
                    showToast('Книга с таким названием уже существует', 'error');
                } else {
                    showToast('Ошибка при создании', 'error');
                }
            } catch (error) {
                showToast('Ошибка подключения', 'error');
            }
        }
        
        async function updateBook(id, data) {
            try {
                const response = await fetchWithAuth(`${API_URL}/book/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.status === 200) {
                    showToast('Книга обновлена', 'success');
                    closeModal();
                    fetchBooks();
                } else {
                    showToast('Ошибка при обновлении', 'error');
                }
            } catch (error) {
                showToast('Ошибка подключения', 'error');
            }
        }
        
        async function deleteBook(id) {
            if (!confirm('Вы уверены?')) return;
            try {
                const response = await fetchWithAuth(`${API_URL}/book/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.status === 204) {
                    showToast('Книга удалена', 'success');
                    fetchBooks();
                } else if (response.status === 403) {
                    showToast('Вы не можете удалить эту книгу', 'error');
                } else {
                    showToast('Ошибка при удалении', 'error');
                }
            } catch (error) {
                showToast('Ошибка подключения', 'error');
            }
        }
        
        function editBook(id, title, genre, description) {
            document.getElementById('modalTitle').textContent = 'Редактировать книгу';
            document.getElementById('bookId').value = id;
            document.getElementById('title').value = title;
            document.getElementById('genre').value = genre;
            document.getElementById('description').value = description === 'null' ? '' : (description || '');
            document.getElementById('bookModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('bookModal').classList.remove('active');
            document.getElementById('bookForm').reset();
            document.getElementById('bookId').value = '';
            document.getElementById('modalTitle').textContent = 'Добавить книгу';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => logout());
        document.getElementById('applyFilters').addEventListener('click', () => {
            currentGenre = document.getElementById('genreFilter').value;
            currentLimit = parseInt(document.getElementById('limitFilter').value);
            currentPage = 1;
            fetchBooks();
        });
        document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; fetchBooks(); } });
        document.getElementById('nextPage').addEventListener('click', () => { currentPage++; fetchBooks(); });
        document.getElementById('createBookBtn').addEventListener('click', () => document.getElementById('bookModal').classList.add('active'));
        document.getElementById('bookForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('bookId').value;
            const data = {
                title: document.getElementById('title').value,
                genre: document.getElementById('genre').value,
                description: document.getElementById('description').value || null
            };
            id ? updateBook(parseInt(id), data) : createBook(data);
        });
        
        updateNav();
        fetchBooks();
    </script>
</body>
</html>
