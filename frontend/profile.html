<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - FastAPI Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #3a3a3a 0%, #1a1a1a 100%);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .nav-link {
            color: #e0e0e0;
            transition: color 0.2s;
        }
        .nav-link:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <nav class="bg-[#2d2d2d] shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold text-white">📚 Playground</a>
                    <a href="/books.html" class="nav-link">Книги</a>
                    <a href="/auth.html" class="nav-link hidden" id="authLink">Войти</a>
                    <a href="/profile.html" class="text-blue-500 font-semibold">Профиль</a>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="username" class="text-sm text-gray-400"></span>
                    <button id="logoutBtn" class="btn-danger">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="bg-[#2d2d2d] rounded-xl shadow-md p-8">
            <div class="flex items-center space-x-4 mb-6">
                <div class="w-20 h-20 gradient-bg rounded-full flex items-center justify-center text-white text-3xl font-bold">👤</div>
                <div>
                    <h1 id="userName" class="text-2xl font-bold text-white"></h1>
                    <p class="text-gray-400 text-sm">Пользователь</p>
                </div>
            </div>
            
            <div class="border-t border-gray-700 pt-6">
                <h2 class="text-xl font-bold text-white mb-4">Статистика</h2>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="bg-[#3a3a3a] rounded-lg p-4">
                        <p class="text-gray-400 text-sm">Дата регистрации</p>
                        <p id="createdAt" class="text-lg font-semibold text-white"></p>
                    </div>
                    <div class="bg-[#3a3a3a] rounded-lg p-4">
                        <p class="text-gray-400 text-sm">Статус</p>
                        <p id="status" class="text-lg font-semibold text-green-500">Активен</p>
                    </div>
                </div>
            </div>
            
            <div class="border-t border-gray-700 pt-6 mt-6">
                <h2 class="text-xl font-bold text-white mb-4">Мои книги</h2>
                <div id="myBooks" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        
        function getToken() {
            return localStorage.getItem('access_token');
        }
        
        async function loadProfile() {
            const token = getToken();
            if (!token) {
                window.location.href = '/auth.html';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = '/auth.html';
                    return;
                }
                
                const user = await response.json();
                
                document.getElementById('userName').textContent = user.username;
                document.getElementById('createdAt').textContent = new Date(user.created_at).toLocaleDateString('ru-RU');
                document.getElementById('username').textContent = user.username;
                
                await loadUserBooks(user.id);
            } catch (error) {
                Swal.fire('Ошибка', 'Не удалось загрузить профиль', 'error');
            }
        }
        
        async function loadUserBooks(userId) {
            const token = getToken();
            try {
                const response = await fetch(`${API_URL}/book/?author_id=${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const books = await response.json();
                const container = document.getElementById('myBooks');
                
                if (!books.length) {
                    container.innerHTML = '<p class="text-gray-500">У вас пока нет книг</p>';
                    return;
                }
                
                container.innerHTML = books.map(book => `
                    <div class="bg-[#3a3a3a] rounded-lg p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-semibold text-white">${escapeHtml(book.title)}</h3>
                            <p class="text-sm text-gray-400">${escapeHtml(book.genre)}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editBook(${book.id})" class="text-blue-400 hover:text-blue-300 text-sm">✏️ Редактировать</button>
                            <button onclick="deleteBook(${book.id})" class="text-red-400 hover:text-red-300 text-sm">🗑️ Удалить</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading user books:', error);
            }
        }
        
        async function deleteBook(id) {
            const result = await Swal.fire({
                title: 'Вы уверены?',
                text: 'Это действие нельзя отменить',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Да, удалить'
            });
            
            if (result.isConfirmed) {
                try {
                    const response = await fetch(`${API_URL}/book/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${getToken()}` }
                    });
                    
                    if (response.status === 204) {
                        Swal.fire('Удалено', 'Книга удалена', 'success');
                        loadProfile();
                    } else {
                        Swal.fire('Ошибка', 'Не удалось удалить книгу', 'error');
                    }
                } catch (error) {
                    Swal.fire('Ошибка', 'Проверьте подключение к серверу', 'error');
                }
            }
        }
        
        function editBook(id) {
            window.location.href = `/books.html?edit=${id}`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('access_token');
            window.location.href = '/';
        });
        
        loadProfile();
    </script>
</body>
</html>
