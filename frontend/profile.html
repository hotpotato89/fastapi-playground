<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - FastAPI Playground</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; }
        .gradient-bg { background: linear-gradient(135deg, #3a3a3a 0%, #1a1a1a 100%); }
        .btn-danger { background: #ef4444; color: white; padding: 0.3rem 0.8rem; border-radius: 0.5rem; font-size: 0.875rem; cursor: pointer; border: none; }
        .btn-danger:hover { background: #dc2626; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: white; font-size: 14px; z-index: 9999; }
        .toast-success { background: #22c55e; }
        .toast-error { background: #ef4444; }
    </style>
</head>
<body>
    <nav class="bg-[#2d2d2d] shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold text-white">📚 Playground</a>
                    <a href="/books.html" class="text-gray-300 hover:text-blue-500">Книги</a>
                    <a href="/auth.html" class="text-gray-300 hover:text-blue-500 hidden" id="authLink">Войти</a>
                    <a href="/profile.html" class="text-blue-500">Профиль</a>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="username" class="text-sm text-gray-400"></span>
                    <button id="logoutBtn" class="bg-red-600 text-white px-3 py-1 rounded text-sm">Выйти</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="bg-[#2d2d2d] rounded-xl shadow-md p-8">
            <div class="flex items-center space-x-4 mb-6">
                <div class="w-20 h-20 gradient-bg rounded-full flex items-center justify-center text-white text-3xl font-bold">👤</div>
                <div>
                    <h1 id="userName" class="text-2xl font-bold text-white"></h1>
                    <p class="text-gray-400 text-sm">Пользователь</p>
                </div>
            </div>
            
            <div class="border-t border-gray-700 pt-6">
                <h2 class="text-xl font-bold text-white mb-4">Статистика</h2>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="bg-[#3a3a3a] rounded-lg p-4">
                        <p class="text-gray-400 text-sm">Дата регистрации</p>
                        <p id="createdAt" class="text-lg font-semibold text-white"></p>
                    </div>
                    <div class="bg-[#3a3a3a] rounded-lg p-4">
                        <p class="text-gray-400 text-sm">Статус</p>
                        <p id="status" class="text-lg font-semibold text-green-500">Активен</p>
                    </div>
                </div>
            </div>
            
            <div class="border-t border-gray-700 pt-6 mt-6">
                <h2 class="text-xl font-bold text-white mb-4">Мои книги</h2>
                <div id="myBooks" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        
        function getToken() { return localStorage.getItem('access_token'); }
        function getRefreshToken() { return localStorage.getItem('refresh_token'); }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        async function refreshAccessToken() {
            const refresh_token = getRefreshToken();
            if (!refresh_token) return null;
            
            try {
                const response = await fetch(`${API_URL}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token })
                });
                
                if (response.status === 200) {
                    const data = await response.json();
                    localStorage.setItem('access_token', data.access_token);
                    return data.access_token;
                }
            } catch (error) {
                console.error('Refresh failed:', error);
            }
            
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/auth.html';
            return null;
        }
        
        async function fetchWithAuth(url, options = {}) {
            let token = getToken();
            
            const makeRequest = async (t) => {
                return fetch(url, {
                    ...options,
                    headers: {
                        ...options.headers,
                        'Authorization': `Bearer ${t}`
                    }
                });
            };
            
            let response = await makeRequest(token);
            
            if (response.status === 401) {
                const newToken = await refreshAccessToken();
                if (newToken) {
                    response = await makeRequest(newToken);
                }
            }
            
            return response;
        }
        
        async function logout() {
            const refresh_token = getRefreshToken();
            if (refresh_token) {
                await fetch(`${API_URL}/auth/logout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token })
                });
            }
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        async function loadProfile() {
            const token = getToken();
            if (!token) { window.location.href = '/auth.html'; return; }
            
            try {
                const response = await fetchWithAuth(`${API_URL}/auth/me`);
                
                if (response.status === 401) {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    window.location.href = '/auth.html';
                    return;
                }
                
                const user = await response.json();
                document.getElementById('userName').textContent = user.username;
                document.getElementById('createdAt').textContent = new Date(user.created_at).toLocaleDateString('ru-RU');
                document.getElementById('username').textContent = user.username;
                await loadUserBooks(user.id);
            } catch (error) {
                showToast('Не удалось загрузить профиль', 'error');
            }
        }
        
        async function loadUserBooks(userId) {
            try {
                const response = await fetchWithAuth(`${API_URL}/book/?author_id=${userId}`);
                const books = await response.json();
                const container = document.getElementById('myBooks');
                
                if (!books.length) {
                    container.innerHTML = '<p class="text-gray-500">У вас пока нет книг</p>';
                    return;
                }
                
                container.innerHTML = books.map(book => `
                    <div class="bg-[#3a3a3a] rounded-lg p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-semibold text-white">${escapeHtml(book.title)}</h3>
                            <p class="text-sm text-gray-400">${escapeHtml(book.genre)}</p>
                        </div>
                        <button onclick="deleteBook(${book.id})" class="text-red-400 hover:text-red-300 text-sm">🗑️ Удалить</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading user books:', error);
            }
        }
        
        async function deleteBook(id) {
            if (!confirm('Вы уверены?')) return;
            try {
                const response = await fetchWithAuth(`${API_URL}/book/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.status === 204) {
                    showToast('Книга удалена', 'success');
                    loadProfile();
                } else {
                    showToast('Ошибка при удалении', 'error');
                }
            } catch (error) {
                showToast('Ошибка подключения', 'error');
            }
        }
        
        document.getElementById('logoutBtn').addEventListener('click', () => logout());
        loadProfile();
    </script>
</body>
</html>
