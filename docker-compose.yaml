services:
    db:
      image: postgres:18-alpine
      ports:
        - '5432:5432'
      volumes:
        - postgres_data:/var/lib/postgresql
      environment:
        - POSTGRES_DB=${DB__NAME}
        - POSTGRES_USER=${DB__USER}
        - POSTGRES_PASSWORD=${DB__PASSWORD}
      restart: unless-stopped

volumes:
  postgres_data: